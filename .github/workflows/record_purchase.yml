name: Record Gold Purchase

on:
  workflow_dispatch:
    inputs:
      purchase_date:
        description: Purchase date (YYYY-MM-DD)
        required: true
        type: string
      item:
        description: Item purchased
        required: true
        default: Gold bar
        type: string
      grams:
        description: Gold weight in grams
        required: true
        type: string
      total_paid_aud:
        description: Total amount paid in AUD
        required: true
        type: string
      source:
        description: Seller
        required: true
        default: Taobao
        type: choice
        options:
          - Taobao
          - Perth Mint
          - Other
      notes:
        description: Optional notes
        required: false
        default: Stored in China; shipping and tax excluded
        type: string

permissions:
  contents: write

concurrency:
  group: gold-data-writes
  cancel-in-progress: false

jobs:
  record-purchase:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate and record purchase
        env:
          PURCHASE_DATE: ${{ inputs.purchase_date }}
          ITEM: ${{ inputs.item }}
          GRAMS: ${{ inputs.grams }}
          TOTAL_PAID_AUD: ${{ inputs.total_paid_aud }}
          SOURCE: ${{ inputs.source }}
          NOTES: ${{ inputs.notes }}
        run: >-
          python record_purchase.py
          --date "$PURCHASE_DATE"
          --item "$ITEM"
          --grams "$GRAMS"
          --total-paid-aud "$TOTAL_PAID_AUD"
          --source "$SOURCE"
          --notes "$NOTES"

      - name: Save purchase
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add my_holdings.csv
          if git diff --cached --quiet; then
            echo "No new purchase to commit"
          else
            git commit -m "chore: record gold purchase [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
